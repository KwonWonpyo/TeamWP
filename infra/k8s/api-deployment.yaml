apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-api
  labels:
    app: agent-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-api
  template:
    metadata:
      labels:
        app: agent-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/teamwp-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: ARCHITECTURE_DB_BACKEND
              value: "postgres"
            - name: ARCHITECTURE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: postgres_dsn
            - name: ARCHITECTURE_QUEUE_BACKEND
              value: "redis"
            - name: ARCHITECTURE_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: redis_url
            - name: ARCHITECTURE_CORS_ORIGINS
              value: "https://dashboard.example.com"
          readinessProbe:
            httpGet:
              path: /api/projects
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/projects
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: agent-api
spec:
  selector:
    app: agent-api
  ports:
    - name: http
      port: 3000
      targetPort: 3000

