apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-worker
  labels:
    app: agent-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-worker
  template:
    metadata:
      labels:
        app: agent-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/teamwp-worker:latest
          env:
            - name: ARCHITECTURE_DB_BACKEND
              value: "postgres"
            - name: ARCHITECTURE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: postgres_dsn
            - name: ARCHITECTURE_QUEUE_BACKEND
              value: "redis"
            - name: ARCHITECTURE_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-secrets
                  key: redis_url
            - name: WORKER_POLL_INTERVAL_SECONDS
              value: "0.3"
            - name: WORKER_DEQUEUE_TIMEOUT_SECONDS
              value: "1"

