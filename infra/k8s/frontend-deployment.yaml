apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-frontend
  labels:
    app: agent-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-frontend
  template:
    metadata:
      labels:
        app: agent-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/your-org/teamwp-frontend:latest
          ports:
            - containerPort: 3001
          env:
            - name: NEXT_PUBLIC_API_BASE
              value: "https://api.example.com"
            - name: NEXT_PUBLIC_WS_BASE
              value: "wss://api.example.com"
---
apiVersion: v1
kind: Service
metadata:
  name: agent-frontend
spec:
  selector:
    app: agent-frontend
  ports:
    - name: http
      port: 3001
      targetPort: 3001

